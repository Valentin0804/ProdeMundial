<div class="unirse-grupo-container">
    <h3>Unirse a un Grupo</h3>
    <p class="text-muted">Ingresá el código de invitación para participar del Prode con tus amigos.</p>

    <input type="text" [(ngModel)]="codigoInvitacion" placeholder="Código (ej: ABC123)" class="input"
        [disabled]="cargando" style="text-transform: uppercase"> <button (click)="unirse()"
        [disabled]="cargando || !codigoInvitacion" class="btn">
        {{ cargando ? 'Verificando código...' : 'Unirse al Grupo' }}
    </button>

    <p *ngIf="error" class="error">{{ error }}</p>
    <p *ngIf="mensajeExito" class="success">{{ mensajeExito }}</p>
</div>
