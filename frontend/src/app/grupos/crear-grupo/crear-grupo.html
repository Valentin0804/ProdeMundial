<div class="crear-grupo-container">
    <h3>Crear Grupo Privado</h3>
    <input type="text" [(ngModel)]="nombreGrupo" placeholder="Nombre del grupo" class="input">

    <button (click)="crear()" [disabled]="cargando" class="btn">
        {{ cargando ? 'Guardando...' : 'Crear' }}
    </button>

    <p *ngIf="error" class="error">{{ error }}</p>
</div>
